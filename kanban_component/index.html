<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
  /* Visual da maquete pfc_app_v3 — SOMENTE estilo; o protocolo de drag-and-drop
     (render/wire/setComponentValue) permanece intocado. */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap');
  :root{
    --bg:#0E1116; --surface:#161A21; --surface2:#1C222B; --hover:#222834;
    --line:rgba(255,255,255,.06); --line2:rgba(255,255,255,.12);
    --ink:#F5F7FA; --muted:#A4AEBF; --dim:#6B7688;
    --accent-dim:rgba(232,135,58,.12);
    --mono:'JetBrains Mono',monospace; --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:transparent;color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px}
  body{padding:2px}
  .banner{font-family:var(--mono);font-size:11.5px;color:#E8B54A;background:rgba(232,181,74,.1);
    border:1px solid rgba(232,181,74,.3);border-radius:10px;padding:9px 13px;margin-bottom:12px}
  .fallback{font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:16px 18px;line-height:1.6}
  .kan{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;align-items:stretch}
  .kcol{background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:14px;
    padding:14px;display:flex;flex-direction:column;transition:.2s}
  .kcol-h{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.5px;
    text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;
    justify-content:space-between;padding:0 4px}
  .kcol-h .ct{color:var(--dim);font-weight:600}
  .kbody{flex:1;display:flex;flex-direction:column;gap:9px;min-height:220px;max-height:600px;
    overflow-y:auto;border-radius:10px;
    transition:background .18s var(--ease),box-shadow .18s var(--ease)}
  .kbody::-webkit-scrollbar{width:8px}
  .kbody::-webkit-scrollbar-thumb{background:#242A34;border-radius:6px}
  .kbody.dragover{box-shadow:inset 0 0 0 2px var(--accent);background:var(--accent-dim)}
  .kcard{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:11px;
    padding:13px 13px 13px 16px;cursor:grab;overflow:hidden;--c:#7C8698;flex:none;
    transition:transform .15s var(--ease),border-color .15s var(--ease),opacity .15s var(--ease)}
  .kcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c)}
  .kcard:hover{border-color:var(--line2);transform:translateY(-2px)}
  .kcard:active{cursor:grabbing}
  .kcard.dragging{opacity:.4;cursor:grabbing}
  .kcard .kn{font-size:13.5px;font-weight:600;line-height:1.3;margin-bottom:4px}
  .kcard .km{font-family:var(--mono);font-size:10.5px;color:var(--dim);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .empty{font-family:var(--mono);font-size:11px;color:var(--dim);text-align:center;padding:10px;
    border:1px dashed var(--line2);border-radius:9px}
  @media (max-width:900px){.kan{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function () {
  "use strict";
  // ---- protocolo do componente Streamlit (sem libs externas) ----
  function send(type, data) {
    window.parent.postMessage(
      Object.assign({ isStreamlitMessage: true, type: type }, data || {}), "*");
  }
  function setHeight() {
    var h = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight, 160);
    send("streamlit:setFrameHeight", { height: h });
  }
  function esc(s) {
    s = (s == null ? "" : String(s));
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  var supportsDnD = ("draggable" in document.createElement("div"));
  var dragId = null, dragFrom = null;

  // Listra lateral por Score PFC (limiares das organizações: 85/70,
  // coerentes com os chips de score usados no restante do app).
  function corScore(sc) {
    sc = +sc || 0;
    return sc >= 85 ? "#4ADE80" : sc >= 70 ? "#E8B54A" : "#7C8698";
  }

  function cardHTML(c) {
    var meta = esc(String(c.setor || "—").toUpperCase()) + " · SCORE " + esc(c.score);
    if (c.valor && c.valor !== "—") { meta += " · " + esc(c.valor); }
    return '<div class="kcard" draggable="true" data-id="' + esc(c.id) + '" data-status="' + esc(c.status) + '"' +
      ' style="--c:' + corScore(c.score) + '">' +
      '<div class="kn">' + esc(c.nome) + '</div>' +
      '<div class="km">' + meta + '</div></div>';
  }

  function render(args) {
    var root = document.getElementById("root");
    if (!supportsDnD) {
      root.innerHTML = '<div class="fallback">⚠️ Arrastar-e-soltar não é suportado neste navegador. ' +
        'Use o <b>dossiê</b> (clique no card no Ranking) para mudar o status.</div>';
      setHeight();
      return;
    }
    var colunas = (args && args.colunas) || [];
    var editable = !args || args.editable !== false;
    var html = "";
    if (!editable) {
      html += '<div class="banner">🟠 Modo local (CSV): você pode arrastar, mas a mudança não é gravada — apenas demonstra o aviso.</div>';
    }
    html += '<div class="kan">';
    colunas.forEach(function (col) {
      html += '<div class="kcol"><div class="kcol-h" style="color:' + esc(col.cor) + '">' +
        '<span>' + esc(col.status) + '</span>' +
        '<span class="ct" id="ct_' + esc(col.status) + '">' + col.cards.length + '</span></div>';
      html += '<div class="kbody" data-status="' + esc(col.status) + '" style="--accent:' + esc(col.cor) + '">';
      col.cards.forEach(function (c) { html += cardHTML(c); });
      if (col.cards.length === 0) { html += '<div class="empty">solte aqui</div>'; }
      html += '</div></div>';
    });
    html += '</div>';
    root.innerHTML = html;
    wire();
    setHeight();
  }

  function refreshCounts() {
    document.querySelectorAll(".kbody").forEach(function (b) {
      var n = b.querySelectorAll(".kcard").length;
      var ct = document.getElementById("ct_" + b.dataset.status);
      if (ct) ct.textContent = n;
      var empty = b.querySelector(".empty");
      if (n > 0 && empty) empty.remove();
      else if (n === 0 && !empty) {
        var d = document.createElement("div"); d.className = "empty"; d.textContent = "solte aqui"; b.appendChild(d);
      }
    });
  }

  function wire() {
    document.querySelectorAll(".kcard").forEach(function (card) {
      card.addEventListener("dragstart", function (e) {
        dragId = card.dataset.id; dragFrom = card.dataset.status;
        card.classList.add("dragging");
        if (e.dataTransfer) { e.dataTransfer.effectAllowed = "move"; try { e.dataTransfer.setData("text/plain", dragId); } catch (_) {} }
      });
      card.addEventListener("dragend", function () {
        card.classList.remove("dragging");
        document.querySelectorAll(".kbody").forEach(function (b) { b.classList.remove("dragover"); });
      });
    });
    document.querySelectorAll(".kbody").forEach(function (body) {
      body.addEventListener("dragover", function (e) {
        e.preventDefault(); if (e.dataTransfer) e.dataTransfer.dropEffect = "move"; body.classList.add("dragover");
      });
      body.addEventListener("dragleave", function (e) {
        if (!body.contains(e.relatedTarget)) body.classList.remove("dragover");
      });
      body.addEventListener("drop", function (e) {
        e.preventDefault(); body.classList.remove("dragover");
        var novo = body.dataset.status;
        if (dragId && novo && novo !== dragFrom) {
          // move otimista no DOM
          var el = null;
          document.querySelectorAll(".kcard").forEach(function (c) { if (c.dataset.id === dragId) el = c; });
          if (el) {
            var empty = body.querySelector(".empty"); if (empty) empty.remove();
            el.dataset.status = novo; body.appendChild(el); refreshCounts();
          }
          // devolve a mudança para o Python (sem reload -> sessão preservada)
          send("streamlit:setComponentValue", {
            value: { org_id: dragId, novo_status: novo, de: dragFrom, nonce: Date.now() },
            dataType: "json"
          });
          setHeight();
        }
        dragId = null; dragFrom = null;
      });
    });
  }

  window.addEventListener("message", function (e) {
    if (e.data && e.data.type === "streamlit:render") { render(e.data.args || {}); }
  });
  window.addEventListener("resize", setHeight);

  // anuncia que o componente está pronto -> Streamlit envia o primeiro render
  send("streamlit:componentReady", { apiVersion: 1 });
  setHeight();
})();
</script>
</body>
</html>
