# Tema do Dashboard de Captação (PFC) — paleta da maquete pfc_app_v3
# Laranja como acento único; superfícies frias azuladas.
[theme]
base = "dark"
primaryColor = "#E8873A"             # laranja (acento da maquete)
backgroundColor = "#0E1116"          # fundo
secondaryBackgroundColor = "#161A21" # superfície (cards/sidebar)
textColor = "#F5F7FA"                # texto principal
font = "sans serif"

[server]
headless = true
# Sobe sem abrir navegador automaticamente; mude para false se preferir.
runOnSave = true

[browser]
gatherUsageStats = false
