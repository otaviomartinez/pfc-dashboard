# Tema escuro minimalista do Dashboard de Captação (PFC)
# Cinza neutro como base; cor só para destaques semânticos.
[theme]
base = "dark"
primaryColor = "#5B9BD5"             # azul discreto (foco/seleção)
backgroundColor = "#0A0C0F"          # fundo bem escuro
secondaryBackgroundColor = "#141820" # superfície (1-2 tons acima)
textColor = "#E9EBEE"                # texto cinza claro
font = "sans serif"

[server]
headless = true
# Sobe sem abrir navegador automaticamente; mude para false se preferir.
runOnSave = true

[browser]
gatherUsageStats = false
