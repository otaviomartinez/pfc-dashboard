name: Radar de Descoberta

# Roda todo dia às 09:00 UTC (06:00 Brasília) e também sob demanda.
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r radar/requirements.txt

      - name: Rodar o radar
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_KEY: ${{ secrets.SPREADSHEET_KEY }}
        run: python -m radar.main

      - name: Publicar CSVs de saída (artefatos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-saidas
          path: radar/*.csv
          if-no-files-found: ignore
